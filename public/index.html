<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>timecut &ndash; HTML to Video Capture</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.02em;
    }

    header h1 span { color: #38bdf8; }

    header p {
      color: #94a3b8;
      font-size: 0.875rem;
    }

    main {
      flex: 1;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.75rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #94a3b8;
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      color: #e2e8f0;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      font-family: inherit;
      transition: border-color 0.15s;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #38bdf8;
    }

    textarea {
      min-height: 140px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.8125rem;
      resize: vertical;
    }

    .source-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .tab-btn {
      background: #0f172a;
      border: 1px solid #334155;
      color: #94a3b8;
      border-radius: 0.375rem;
      padding: 0.375rem 0.875rem;
      font-size: 0.8125rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: #38bdf8;
      border-color: #38bdf8;
      color: #0f172a;
      font-weight: 600;
    }

    .tab-btn:hover:not(.active) {
      border-color: #64748b;
      color: #cbd5e1;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.625rem 1.25rem;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn-primary {
      background: #0ea5e9;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: #38bdf8; }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }

    .btn-danger:hover:not(:disabled) { background: #f87171; }

    .btn-success {
      background: #22c55e;
      color: #fff;
    }

    .btn-success:hover:not(:disabled) { background: #4ade80; }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #status-card { display: none; }

    .progress-bar-track {
      background: #0f172a;
      border-radius: 9999px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, #0ea5e9, #38bdf8);
      height: 100%;
      width: 0%;
      border-radius: 9999px;
      transition: width 0.4s ease;
    }

    .log-box {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 0.5rem;
      padding: 0.75rem;
      height: 160px;
      overflow-y: auto;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.75rem;
      color: #64748b;
    }

    .log-box p { line-height: 1.5; }
    .log-box p.info  { color: #38bdf8; }
    .log-box p.success { color: #4ade80; }
    .log-box p.error  { color: #f87171; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.625rem;
      border-radius: 9999px;
    }

    .badge-running {
      background: #1e3a5f;
      color: #38bdf8;
    }

    .badge-done {
      background: #14532d;
      color: #4ade80;
    }

    .badge-error {
      background: #450a0a;
      color: #f87171;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #result-card { display: none; }

    video {
      width: 100%;
      border-radius: 0.5rem;
      background: #000;
      margin-bottom: 1rem;
    }

    .hint {
      color: #64748b;
      font-size: 0.75rem;
      margin-top: 0.25rem;
    }

    .drop-zone {
      margin-top: 0.75rem;
      border: 1px dashed #475569;
      border-radius: 0.5rem;
      padding: 0.75rem;
      text-align: center;
      color: #94a3b8;
      font-size: 0.8125rem;
      background: #0f172a;
    }

    .drop-zone.dragover {
      border-color: #38bdf8;
      color: #38bdf8;
    }

    #selected-files {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #cbd5e1;
    }

    #batch-jobs {
      margin-top: 1rem;
      display: grid;
      gap: 0.5rem;
    }

    .batch-job {
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: #0f172a;
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      align-items: center;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>time<span>cut</span></h1>
      <p>Real-time HTML to video capture</p>
    </div>
  </header>

  <main>
    <!-- Source -->
    <div class="card">
      <h2>Source</h2>
      <div class="source-tabs">
        <button class="tab-btn active" data-tab="url">URL / File</button>
        <button class="tab-btn" data-tab="html">Inline HTML</button>
        <button class="tab-btn" data-tab="files">HTML Files</button>
      </div>

      <div id="tab-url" class="tab-panel active">
        <div class="form-group">
          <label for="url">Page URL or local file path</label>
          <input type="text" id="url" placeholder="https://example.com  or  index.html" value="index.html" />
          <span class="hint">Relative paths resolve from the current working directory.</span>
        </div>
      </div>

      <div id="tab-html" class="tab-panel">
        <div class="form-group">
          <label for="html-content">HTML content</label>
          <textarea id="html-content" placeholder="&lt;!DOCTYPE html&gt;&#10;&lt;html&gt;…&lt;/html&gt;"></textarea>
          <span class="hint">The HTML will be saved to a temporary file and captured.</span>
        </div>
      </div>

      <div id="tab-files" class="tab-panel">
        <div class="form-group">
          <label for="html-files">Select HTML files</label>
          <input type="file" id="html-files" accept=".html,.htm,text/html" multiple />
          <div id="drop-zone" class="drop-zone">Drag and drop HTML files here</div>
          <div id="selected-files"></div>
        </div>
      </div>
    </div>

    <!-- Capture Settings -->
    <div class="card">
      <h2>Capture Settings</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="fps">Frames per second</label>
          <input type="number" id="fps" value="60" min="1" max="120" />
        </div>
        <div class="form-group">
          <label for="duration">Duration (seconds)</label>
          <input type="number" id="duration" value="5" min="0.1" step="0.1" />
        </div>
        <div class="form-group">
          <label for="width">Viewport width (px)</label>
          <input type="number" id="width" value="800" min="1" />
        </div>
        <div class="form-group">
          <label for="height">Viewport height (px)</label>
          <input type="number" id="height" value="600" min="1" />
        </div>
        <div class="form-group">
          <label for="start">Start offset (seconds)</label>
          <input type="number" id="start" value="0" min="0" step="0.1" />
        </div>
        <div class="form-group">
          <label for="pix-fmt">Pixel format</label>
          <select id="pix-fmt">
            <option value="yuv420p" selected>yuv420p (default)</option>
            <option value="yuv444p">yuv444p</option>
            <option value="rgb24">rgb24</option>
          </select>
        </div>
        <div class="form-group">
          <label for="output">Output filename</label>
          <input type="text" id="output" value="video.mp4" />
        </div>
        <div class="form-group">
          <label for="screenshot-type">Screenshot format</label>
          <select id="screenshot-type">
            <option value="png" selected>PNG</option>
            <option value="jpeg">JPEG</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="card">
      <div class="actions">
        <button class="btn btn-primary" id="btn-record">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/></svg>
          Start Recording
        </button>
        <button class="btn btn-danger" id="btn-stop" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          Stop
        </button>
      </div>
    </div>

    <!-- Status -->
    <div class="card" id="status-card">
      <h2>
        <span id="status-badge"></span>
      </h2>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
      <div class="log-box" id="log-box"></div>
      <div id="batch-jobs"></div>
    </div>

    <!-- Result -->
    <div class="card" id="result-card">
      <h2>Result</h2>
      <video id="result-video" controls></video>
      <div class="actions">
        <a class="btn btn-success" id="btn-download" href="#" download>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Video
        </a>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var currentJobId = null;
      var evtSource = null;
      var jobSources = [];
      var batchJobs = {};
      var activeTab = 'url';
      var selectedHtmlFiles = [];

      // Tab switching
      document.querySelectorAll('.tab-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          activeTab = btn.dataset.tab;
          document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
          document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });
          btn.classList.add('active');
          document.getElementById('tab-' + activeTab).classList.add('active');
        });
      });

      function setStatus(state) {
        var badge = document.getElementById('status-badge');
        if (state === 'running') {
          badge.className = 'status-badge badge-running';
          badge.innerHTML = '<span class="pulse"></span> Recording…';
        } else if (state === 'done') {
          badge.className = 'status-badge badge-done';
          badge.innerHTML = '<span>&#10003;</span> Done';
        } else {
          badge.className = 'status-badge badge-error';
          badge.innerHTML = '<span>&#10005;</span> Error';
        }
      }

      function addLog(msg, type) {
        var box = document.getElementById('log-box');
        var p = document.createElement('p');
        p.className = type || '';
        p.textContent = msg;
        box.appendChild(p);
        box.scrollTop = box.scrollHeight;
      }

      function setProgress(pct) {
        document.getElementById('progress-bar').style.width = Math.min(100, pct) + '%';
      }

      function renderSelectedFiles() {
        var box = document.getElementById('selected-files');
        if (!selectedHtmlFiles.length) {
          box.textContent = '';
          return;
        }
        box.textContent = selectedHtmlFiles.map(function (f) { return f.name; }).join(', ');
      }

      function readFileAsText(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () { resolve(String(reader.result || '')); };
          reader.onerror = function () { reject(new Error('Could not read ' + file.name)); };
          reader.readAsText(file);
        });
      }

      function closeAllSources() {
        if (evtSource) { evtSource.close(); }
        evtSource = null;
        jobSources.forEach(function (source) { source.close(); });
        jobSources = [];
      }

      function resetBatchList() {
        batchJobs = {};
        document.getElementById('batch-jobs').innerHTML = '';
      }

      function renderBatchJob(jobId) {
        var job = batchJobs[jobId];
        if (!job) { return; }
        var row = document.getElementById('batch-job-' + jobId);
        if (!row) {
          row = document.createElement('div');
          row.id = 'batch-job-' + jobId;
          row.className = 'batch-job';
          document.getElementById('batch-jobs').appendChild(row);
        }
        row.innerHTML = '<span>' + job.name + '</span><span>' + job.status + ' ' + job.progress + '%</span>';
      }

      function updateControlsForRunning(isRunning) {
        document.getElementById('btn-record').disabled = isRunning;
        document.getElementById('btn-stop').disabled = !isRunning;
      }

      function handleSelectedFiles(fileList) {
        selectedHtmlFiles = Array.prototype.filter.call(fileList || [], function (f) {
          return /\.html?$/i.test(f.name);
        });
        renderSelectedFiles();
      }

      document.getElementById('html-files').addEventListener('change', function (e) {
        handleSelectedFiles(e.target.files);
      });

      var dropZone = document.getElementById('drop-zone');
      ['dragenter', 'dragover'].forEach(function (evtName) {
        dropZone.addEventListener(evtName, function (e) {
          e.preventDefault();
          e.stopPropagation();
          dropZone.classList.add('dragover');
        });
      });
      ['dragleave', 'drop'].forEach(function (evtName) {
        dropZone.addEventListener(evtName, function (e) {
          e.preventDefault();
          e.stopPropagation();
          dropZone.classList.remove('dragover');
        });
      });
      dropZone.addEventListener('drop', function (e) {
        handleSelectedFiles(e.dataTransfer.files);
      });

      document.getElementById('btn-record').addEventListener('click', function () {
        var config = {
          fps: parseFloat(document.getElementById('fps').value) || 60,
          duration: parseFloat(document.getElementById('duration').value) || 5,
          viewport: {
            width: parseInt(document.getElementById('width').value) || 800,
            height: parseInt(document.getElementById('height').value) || 600
          },
          start: parseFloat(document.getElementById('start').value) || 0,
          pixFmt: document.getElementById('pix-fmt').value,
          output: document.getElementById('output').value || 'video.mp4',
          screenshotType: document.getElementById('screenshot-type').value
        };

        if (activeTab === 'url') {
          config.url = document.getElementById('url').value || 'index.html';
        } else {
          config.htmlContent = document.getElementById('html-content').value;
        }

        // Reset UI
        closeAllSources();
        currentJobId = null;
        document.getElementById('log-box').innerHTML = '';
        document.getElementById('result-card').style.display = 'none';
        document.getElementById('result-video').src = '';
        setProgress(0);
        resetBatchList();
        document.getElementById('status-card').style.display = '';
        setStatus('running');
        updateControlsForRunning(true);

        if (activeTab === 'files') {
          if (!selectedHtmlFiles.length) {
            addLog('Select at least one HTML file.', 'error');
            setStatus('error');
            updateControlsForRunning(false);
            return;
          }

          Promise.all(selectedHtmlFiles.map(function (file) {
            return readFileAsText(file).then(function (content) {
              return { name: file.name, htmlContent: content };
            });
          }))
            .then(function (filesPayload) {
              return fetch('/batch-record', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  output: config.output,
                  config: config,
                  files: filesPayload
                })
              });
            })
            .then(function (res) { return res.json(); })
            .then(function (data) {
              if (data.error) {
                throw new Error(data.error);
              }
              addLog('Batch output folder: ' + data.outputDirectory, 'info');
              var remaining = data.jobs.length;
              data.jobs.forEach(function (jobInfo) {
                batchJobs[jobInfo.jobId] = { name: jobInfo.name, status: 'queued', progress: 0 };
                renderBatchJob(jobInfo.jobId);
                subscribeProgress(jobInfo.jobId, {
                  onQueued: function (info) {
                    batchJobs[jobInfo.jobId].status = 'queued (#' + info.position + ')';
                    renderBatchJob(jobInfo.jobId);
                  },
                  onRunning: function () {
                    batchJobs[jobInfo.jobId].status = 'running';
                    renderBatchJob(jobInfo.jobId);
                  },
                  onProgress: function (info) {
                    var pct = info.total > 0 ? Math.round((info.captured / info.total) * 100) : 0;
                    batchJobs[jobInfo.jobId].status = 'running';
                    batchJobs[jobInfo.jobId].progress = pct;
                    renderBatchJob(jobInfo.jobId);
                  },
                  onDone: function () {
                    batchJobs[jobInfo.jobId].status = 'done';
                    batchJobs[jobInfo.jobId].progress = 100;
                    renderBatchJob(jobInfo.jobId);
                    remaining--;
                    if (remaining === 0) {
                      setStatus('done');
                      setProgress(100);
                      updateControlsForRunning(false);
                    }
                  },
                  onError: function (msg) {
                    batchJobs[jobInfo.jobId].status = 'error';
                    renderBatchJob(jobInfo.jobId);
                    addLog(jobInfo.name + ': ' + msg, 'error');
                    remaining--;
                    if (remaining === 0) {
                      setStatus('error');
                      updateControlsForRunning(false);
                    }
                  }
                });
              });
            })
            .catch(function (err) {
              addLog('Batch request failed: ' + err.message, 'error');
              setStatus('error');
              updateControlsForRunning(false);
            });
          return;
        }

        fetch('/record', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(config)
        })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.error) {
              addLog('Error: ' + data.error, 'error');
              setStatus('error');
              updateControlsForRunning(false);
              return;
            }
            currentJobId = data.jobId;
            subscribeProgress(currentJobId);
          })
          .catch(function (err) {
            addLog('Request failed: ' + err.message, 'error');
            setStatus('error');
            updateControlsForRunning(false);
          });
      });

      document.getElementById('btn-stop').addEventListener('click', function () {
        if (currentJobId) {
          fetch('/stop/' + currentJobId, { method: 'POST' }).catch(function () {});
        }
        Object.keys(batchJobs).forEach(function (jobId) {
          fetch('/stop/' + jobId, { method: 'POST' }).catch(function () {});
        });
        document.getElementById('btn-stop').disabled = true;
      });

      function subscribeProgress(jobId, handlers) {
        var localHandlers = handlers || {};
        var source = new EventSource('/progress/' + jobId);
        if (!handlers) {
          if (evtSource) { evtSource.close(); }
          evtSource = source;
        } else {
          jobSources.push(source);
        }

        source.addEventListener('queued', function (e) {
          try {
            var info = JSON.parse(e.data);
            if (localHandlers.onQueued) { localHandlers.onQueued(info); }
            addLog('Job ' + jobId + ' queued at position #' + info.position, 'info');
          } catch (err) {}
        });

        source.addEventListener('running', function () {
          if (localHandlers.onRunning) { localHandlers.onRunning(); }
        });

        source.addEventListener('log', function (e) {
          addLog(e.data);
        });

        source.addEventListener('progress', function (e) {
          var info = JSON.parse(e.data);
          if (localHandlers.onProgress) { localHandlers.onProgress(info); }
          if (info.total > 0) {
            setProgress((info.captured / info.total) * 95);
            addLog('Frame ' + info.captured + ' / ' + info.total, 'info');
          }
        });

        source.addEventListener('done', function (e) {
          var info = JSON.parse(e.data);
          if (localHandlers.onDone) { localHandlers.onDone(info); }
          setProgress(100);
          source.close();
          if (!handlers) {
            setStatus('done');
            updateControlsForRunning(false);
          }

          if (!handlers && info.output) {
            var videoUrl = '/download/' + encodeURIComponent(info.output);
            var videoEl = document.getElementById('result-video');
            videoEl.src = videoUrl;
            var dlBtn = document.getElementById('btn-download');
            dlBtn.href = videoUrl;
            dlBtn.download = info.output.split('/').pop();
            document.getElementById('result-card').style.display = '';
          }
        });

        source.addEventListener('error', function (e) {
          var msg = e.data || 'Unknown error';
          if (localHandlers.onError) { localHandlers.onError(msg); }
          addLog('Error: ' + msg, 'error');
          source.close();
          if (!handlers) {
            setStatus('error');
            setProgress(0);
            updateControlsForRunning(false);
          }
        });
      }
    })();
  </script>
</body>
</html>
