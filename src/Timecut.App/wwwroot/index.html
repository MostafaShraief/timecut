<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Timecut</title>
    <base href="/" />

    <!-- MudBlazor -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <!-- BlazorMonaco -->
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="_content/BlazorMonaco/lib/monaco-editor/min/vs/editor/editor.main.css">

    <link rel="stylesheet" href="Timecut.App.styles.css" />
    <link rel="icon" href="data:,">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            overflow-y: auto;
            overflow-x: hidden;
        }
        #app {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }
        .status-bar-safe-area {
            display: none;
        }
        #blazor-error-ui {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            display: none;
        }
        #blazor-error-ui .reload { color: white; }
        #blazor-error-ui .dismiss { color: white; cursor: pointer; position: absolute; right: 16px; top: 8px; }
    </style>
</head>

<body>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">&#x2716;</a>
    </div>

    <!-- BlazorMonaco -->
    <script src="_content/BlazorMonaco/lib/monaco-editor/min/vs/loader.js"></script>
    <script>require.config({ paths: { 'vs': '_content/BlazorMonaco/lib/monaco-editor/min/vs' } });</script>
    <script src="_content/BlazorMonaco/lib/monaco-editor/min/vs/editor/editor.main.nls.js"></script>
    <script src="_content/BlazorMonaco/lib/monaco-editor/min/vs/editor/editor.main.js"></script>
    <script src="_content/BlazorMonaco/jsInterop.js"></script>

    <!-- MudBlazor -->
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
